services:

  # --------------------------------------------------------------
  # PHP-FPM Application
  amg-app:
    build:
      context: ./
      dockerfile: configs/app.dockerfile
    image: amg-app
    container_name: amg-app
    working_dir: /var/www
    volumes:
      - ../website:/var/www
    environment:
      - DB_PORT=3306
      - DB_HOST=amg-db
    depends_on:
      amg-db:
        condition: service_healthy

  # --------------------------------------------------------------
  # Nginx Web Server
  amg-web:
    build:
      context: ./
      dockerfile: configs/web.dockerfile
    image: amg-web
    container_name: amg-web
    working_dir: /var/www
    volumes_from:
      - amg-app
    ports:
      - "8080:80"
    depends_on:
      - amg-app

  # --------------------------------------------------------------
  # MySQL 5.7 (matching original schema)
  # platform: linux/amd64 required — MySQL 5.7 has no ARM64 image (Apple Silicon)
  amg-db:
    image: mysql:5.7
    platform: linux/amd64
    container_name: amg-db
    volumes:
      - ../data/dbdata:/var/lib/mysql
    environment:
      MYSQL_DATABASE: amg_master
      MYSQL_USER: homestead
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "33060:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------
  # phpMyAdmin — http://localhost:8095
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    platform: linux/amd64
    container_name: amg-phpmyadmin
    environment:
      PMA_HOST: amg-db
      MYSQL_ROOT_PASSWORD: secret
    links:
      - amg-db:db
    ports:
      - "8095:80"
    depends_on:
      - amg-db

networks:
  default:
    name: amg-network
